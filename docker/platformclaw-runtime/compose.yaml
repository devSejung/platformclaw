name: platformclaw

services:
  openclaw-gateway:
    image: ${PLATFORMCLAW_IMAGE:-platformclaw:local}
    user: "1000:1000"
    environment:
      HOME: /home/node
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      TZ: ${PLATFORMCLAW_TZ:-Asia/Seoul}
    volumes:
      - platformclaw-gateway-state:/home/node/.openclaw
      - platformclaw-workspaces:/var/lib/platformclaw/workspaces
    secrets:
      - platformclaw_gateway_token
    networks:
      platformclaw-gateway-backplane:
        aliases: [gateway.platformclaw.local]
      platformclaw-gateway-egress: {}
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    init: true
    restart: unless-stopped
    command: ["platformclaw-gateway"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  platformclaw-control:
    image: ${PLATFORMCLAW_IMAGE:-platformclaw:local}
    user: "1000:1000"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    environment:
      HOME: /home/node
      PLATFORMCLAW_PUBLIC_ORIGIN: ${PLATFORMCLAW_PUBLIC_ORIGIN:?set PLATFORMCLAW_PUBLIC_ORIGIN}
      PLATFORMCLAW_LISTEN_HOST: 0.0.0.0
      PLATFORMCLAW_LISTEN_PORT: "19001"
      PLATFORMCLAW_DATABASE_PATH: /var/lib/platformclaw/control/platformclaw-control.sqlite
      PLATFORMCLAW_CONTROL_UI_ROOT: /app/ui/dist
      PLATFORMCLAW_PERSONAL_WORKSPACE_ROOT: /var/lib/platformclaw/workspaces
      PLATFORMCLAW_INITIAL_ADMIN_ACCOUNT_IDS_FILE: /run/secrets/platformclaw_initial_admin_ids
      PLATFORMCLAW_GATEWAY_URL: ws://gateway.platformclaw.local:18789
      PLATFORMCLAW_GATEWAY_TOKEN_FILE: /run/secrets/platformclaw_gateway_token
      PLATFORMCLAW_SSH_CREDENTIAL_MASTER_KEY_FILE: /run/secrets/platformclaw_ssh_credential_master_key
      PLATFORMCLAW_CREDENTIAL_BROKER_ADDRESS: /run/platformclaw-credential-broker/credential.sock
      PLATFORMCLAW_EMPLOYEE_AUTH_LOGIN_URL: ${PLATFORMCLAW_EMPLOYEE_AUTH_LOGIN_URL:?set PLATFORMCLAW_EMPLOYEE_AUTH_LOGIN_URL}
      TZ: ${PLATFORMCLAW_TZ:-Asia/Seoul}
    volumes:
      - platformclaw-control-state:/var/lib/platformclaw/control
      - platformclaw-workspaces:/var/lib/platformclaw/workspaces
    tmpfs:
      - /run/platformclaw-credential-broker:uid=1000,gid=1000,mode=0700
    secrets:
      - platformclaw_gateway_token
      - platformclaw_initial_admin_ids
      - platformclaw_ssh_credential_master_key
    networks:
      platformclaw-gateway-backplane: {}
      platformclaw-control-egress: {}
    ports:
      - "127.0.0.1:${PLATFORMCLAW_PUBLIC_PORT:-19001}:19001"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    init: true
    restart: unless-stopped
    command: ["platformclaw-control"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19001/platformclaw/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  platformclaw-gateway-state:
  platformclaw-control-state:
  platformclaw-workspaces:

networks:
  platformclaw-gateway-backplane:
    internal: true
  platformclaw-gateway-egress:
  platformclaw-control-egress:

secrets:
  platformclaw_gateway_token:
    file: ${PLATFORMCLAW_GATEWAY_TOKEN_SECRET_FILE:?set PLATFORMCLAW_GATEWAY_TOKEN_SECRET_FILE}
  platformclaw_initial_admin_ids:
    file: ${PLATFORMCLAW_INITIAL_ADMIN_IDS_SECRET_FILE:?set PLATFORMCLAW_INITIAL_ADMIN_IDS_SECRET_FILE}
  platformclaw_ssh_credential_master_key:
    file: ${PLATFORMCLAW_SSH_CREDENTIAL_MASTER_KEY_SECRET_FILE:?set PLATFORMCLAW_SSH_CREDENTIAL_MASTER_KEY_SECRET_FILE}
